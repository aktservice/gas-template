  <!--camera.html import -->
  <div class="accordion">
    <div class="accordion-item">
      <h2 class="accordion-header">
        <button
          class="accordion-button text-center justify-content-center no-icon"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#camera-accordion"
          aria-expanded="true"
          aria-controls="camera-accordion"
        >
          カメラモジュールを起動(通帳を月１回撮影して下さい)
        </button>
      </h2>
      <div id="camera-accordion" class="accordion-collapse collapse">
        <div class="accordion-body">
          <div class="container">
            <div class="row">
              <div class="input-group text-center mb-3 col-2">
                <input type="file" id="file-import" class="file-import ms-2 form-control" />
                <label class="input-group-text" for="file-import">ネットバンキングのスクリーンショット</label>
              </div>
            </div>
          </div>
          <div class="d-flex justify-content-center">
            <video class="gap-2 mx-auto" id="camera-view"></video>
            <div class="position-relative d-inline-block">
              <img id="photo-result" alt="resultPhoto" class="mx-auto d-none m-2" />
              <span
                id="select-img"
                class="badge bg-success position-absolute top-0 start-0 m-2 d-none"
                >アップロード対象</span
              >
            </div>
          </div>
          <div><canvas id="capture-canvas"></canvas></div>
          <div class="d-grid m-2 col-4 mx-auto">
            <button class="btn btn-outline-secondary rounded-pill" id="photo-shoot">撮影</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <!--import.html import -->
  <div class="container">
    <div class="row">
      <div class="input-group text-center mb-3 col-2">
        <input type="file" id="file-import" class="file-import ms-2 form-control" />
        <label class="input-group-text" for="file-import">ネットバンキングのスクリーンショット</label>
      </div>
    </div>
  </div>
  <!--drawsign.html import -->
  <dialog id="canvasdialog">
    <canvas id="canvasArea"></canvas>
  
    <div id="dialogclose" class="btn-dark btn-lg text-center">閉じる</div>
    <div class="container-fluid text-center">
      <div class="row justify-content-lg-center">
        <div class="col-12 m-1">
          <button id="clearButton" class="btn-danger btn-lg col-10">Clear</button>
        </div>
        <div class="col12 m-1">
          <button id="downloadButton" class="btn-warning btn-lg col-10">Download</button>
        </div>
        <div class="col12 m-1">
          <button id="previewButton" class="btn-info btn-lg col-10">サインを採用</button>
        </div>
        <div class="col12 m-1">
          <button id="copyURLButton" class="btn-light btn-lg col-9">URLをコピー</button>
        </div>
      </div>
  
      <div class="row justify-content-lg-center">
        <div class="col12 m-1">
          <div class="input-group-text">
            <span class="label">ペンの色</span>
            <div class="control with-color">
              <div class="color-palette"></div>
              <input
                id="pencilColor"
                class="input"
                type="text"
                size="10"
                name="pencilColor"
                placeholder="カラーピッカーを開く"
                disabled
              />
            </div>
          </div>
        </div>
  
        <div class="col12 m-1">
          <div class="input-group-text">
            <span class="label">太さ</span>
            <div class="control half">
              <input
                id="pencilSize"
                class="input"
                type="number"
                name="pencilSize"
                placeholder="ペンの太さを入力"
              />
            </div>
          </div>
        </div>
  
        <div class="col-lg-2 m-1 d-none">
          <div class="field">
            <label class="label">透明度</label>
            <div class="control half">
              <input
                id="pencilOpacity"
                class="input"
                type="number"
                name="pencilOpacity"
                placeholder="Sets the opacity level."
                min="0"
                max="1"
                step="0.1"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
  </dialog>
  <div class="column is-half preview-area">
    <img id="preview" hidden />
  </div>
  
  <div class="btn-wrapper">
    <button type="button" class="custom-button btn-sign" id="signbtn">
      <i class="bi bi-pencil"></i> サインする
    </button>
  </div>

  <body>
    <div id="app"></div>
  </body>
</html>
